<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Primary meta -->
    <title>Divini Procure — Procurement Bidding for Real Estate Developers & Vendors</title>
    <meta name="description" content="Divini Procure is a procurement bidding marketplace for real estate development. Developers post bid packages with drawings and a bill of quantities; vetted vendors submit line-item bids with verified credentials — apples-to-apples comparison, not lump-sum guesswork." />
    <link rel="canonical" href="https://diviniprocure.com/" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Divini Procure" />
    <meta property="og:title" content="Divini Procure — Procurement Bidding for Real Estate Developers & Vendors" />
    <meta property="og:description" content="Post bid packages with CAD drawings and a bill of quantities. Get structured, line-item bids from vetted vendors — compared apples-to-apples." />
    <meta property="og:url" content="https://diviniprocure.com/" />
    <meta property="og:image" content="https://diviniprocure.com/og-image.png" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Divini Procure — Procurement Bidding for Real Estate Developers & Vendors" />
    <meta name="twitter:description" content="Post bid packages with CAD drawings and a bill of quantities. Get structured, line-item bids from vetted vendors — compared apples-to-apples." />
    <meta name="twitter:image" content="https://diviniprocure.com/og-image.png" />
    
    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Divini Procure",
      "url": "https://diviniprocure.com/",
      "logo": "https://diviniprocure.com/logo.png",
      "description": "A procurement bidding marketplace for real estate development and construction.",
      "email": "adagentpc@gmail.com"
    }
    </script>
    
    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Divini Procure",
      "applicationCategory": "BusinessApplication",
      "applicationSubCategory": "Procurement & Construction Bidding",
      "operatingSystem": "Web",
      "url": "https://diviniprocure.com/",
      "description": "Developers post project bid packages with drawings and a bill of quantities; vetted vendors and contractors submit line-item bids with verified credentials for apples-to-apples comparison.",
      "featureList": [
        "Project and bid-package posting",
        "CAD and document intake (DWG, DXF, RVT, IFC, PDF, XLSX)",
        "Bill of Quantities line-item bidding",
        "Bid comparison and vendor scoring",
        "Vendor credential and insurance verification",
        "RFQ Q&A clarifications"
      ],
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free to browse and post; vendor subscription and premium tiers available."
      }
    }
    </script>
    
    <!-- JSON-LD: FAQPage (keep in sync with a visible FAQ on the page) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Divini Procure?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Divini Procure is a procurement bidding marketplace for real estate development and construction. Developers post bid packages with drawings and a bill of quantities, and vetted vendors and contractors submit structured line-item bids with verified credentials."
          }
        },
        {
          "@type": "Question",
          "name": "Who is Divini Procure for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Real estate developers running procurement, and the vendors, contractors, subcontractors, suppliers, and fabricators who bid on their projects."
          }
        },
        {
          "@type": "Question",
          "name": "How is Divini Procure different from email RFQs?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Instead of lump-sum bids over scattered email, developers define scope as a Bill of Quantities and vendors price each line item. Bids are compared apples-to-apples, with CAD drawings, document intake, and an RFQ Q&A thread attached to each package."
          }
        },
        {
          "@type": "Question",
          "name": "Are vendors verified?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Vendors upload certifications and insurance, which are reviewed by an admin before approval, and the platform sends document-expiration reminders."
          }
        },
        {
          "@type": "Question",
          "name": "What files can be uploaded to a bid package?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Developers can upload DWG, DXF, RVT, IFC, PDF, XLSX, and image files so vendors can analyze the real drawings before submitting a priced bid."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
